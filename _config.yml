title: Gnosis
description: 'The art of turning ideas into reality'
url: 'https://HY-WG.github.io'
baseurl: ""

author:
  name: 'Josh Gerdes'
  email: josh@joshgerdes.com
  twitter_username: joshgerdes
  facebook_username: joshgerdes
  github_username: joshgerdes
  linkedin_username: joshgerdes

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
      layout: 'post'

destination: _site
paginate: 10
permalink: /:year/:title/

sass:
  sass_dir: _sass
  style: compressed

kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-paginate

exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
